<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Dashboard - City Find</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.6.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(ellipse at 30% 40%, #0a0f2a, #000000);
            font-family: 'Segoe UI', sans-serif;
        }
        .glass-card {
            background: rgba(15, 25, 45, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        .glass-card:hover { border-color: rgba(0, 242, 254, 0.5); transform: translateY(-3px); }
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00f2fe, #9b51e0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #00f2fe; border-radius: 10px; }
    </style>
</head>
<body class="text-white">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8 flex-wrap gap-4">
            <div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">
                    Company Dashboard
                </h1>
                <p class="text-gray-400 mt-1">Manage your ads, track orders, grow your business</p>
            </div>
            <div class="flex gap-3">
                <div class="glass-card px-4 py-2">
                    <i class="fas fa-wallet text-cyan-400"></i>
                    <span id="walletBalance" class="ml-2 font-semibold">$0</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-purple-600 rounded-full flex items-center justify-center">
                        <i class="fas fa-building text-white"></i>
                    </div>
                    <div>
                        <p id="companyName" class="font-semibold">Company Name</p>
                        <p class="text-xs text-cyan-400" id="companyRating">⭐ 0.0</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="glass-card p-6 text-center">
                <i class="fas fa-ad text-3xl text-cyan-400 mb-2"></i>
                <p class="stat-number" id="statActiveAds">0</p>
                <p class="text-sm text-gray-400">Active Ads</p>
            </div>
            <div class="glass-card p-6 text-center">
                <i class="fas fa-eye text-3xl text-purple-400 mb-2"></i>
                <p class="stat-number" id="statTotalViews">0</p>
                <p class="text-sm text-gray-400">Total Views</p>
            </div>
            <div class="glass-card p-6 text-center">
                <i class="fas fa-shopping-cart text-3xl text-green-400 mb-2"></i>
                <p class="stat-number" id="statOrders">0</p>
                <p class="text-sm text-gray-400">Orders Received</p>
            </div>
            <div class="glass-card p-6 text-center">
                <i class="fas fa-dollar-sign text-3xl text-yellow-400 mb-2"></i>
                <p class="stat-number" id="statRevenue">$0</p>
                <p class="text-sm text-gray-400">Total Revenue</p>
            </div>
        </div>

        <!-- Create Ad Form -->
        <div class="glass-card p-6 mb-8">
            <h2 class="text-xl font-bold mb-4"><i class="fas fa-plus-circle text-cyan-400 mr-2"></i> Create New Advertisement</h2>
            <form id="createAdForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="adTitle" placeholder="Ad Title *" class="bg-white/10 border border-white/20 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-400" required>
                <textarea id="adDescription" placeholder="Description *" rows="3" class="bg-white/10 border border-white/20 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-400 md:col-span-2" required></textarea>
                <select id="adCategory" class="bg-white/10 border border-white/20 rounded-lg px-4 py-2">
                    <option value="cars">🚗 Cars & Vehicles</option>
                    <option value="electronics">📱 Electronics</option>
                    <option value="fashion">👕 Fashion & Beauty</option>
                    <option value="realestate">🏠 Real Estate</option>
                    <option value="services">⚙️ Business Services</option>
                    <option value="food">🍔 Food & Beverage</option>
                    <option value="tech">💻 Technology & IT</option>
                </select>
                <select id="adType" class="bg-white/10 border border-white/20 rounded-lg px-4 py-2">
                    <option value="banner">📢 Banner - $100/month</option>
                    <option value="featured">⭐ Featured - $500/month</option>
                    <option value="sponsored">💎 Sponsored - $1,000/month</option>
                </select>
                <input type="number" id="adPrice" placeholder="Custom Price (USD)" class="bg-white/10 border border-white/20 rounded-lg px-4 py-2">
                <input type="date" id="adExpiry" class="bg-white/10 border border-white/20 rounded-lg px-4 py-2">
                <div class="md:col-span-2">
                    <label class="block text-sm text-gray-400 mb-2">Upload Media (Images/Videos)</label>
                    <input type="file" id="adMedia" accept="image/*,video/*" multiple class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-2">
                </div>
                <button type="submit" class="md:col-span-2 bg-gradient-to-r from-cyan-500 to-purple-600 rounded-full py-3 font-semibold hover:scale-105 transition">
                    <i class="fas fa-cloud-upload-alt mr-2"></i> Publish Ad
                </button>
            </form>
        </div>

        <!-- My Ads -->
        <div class="glass-card p-6 mb-8">
            <h2 class="text-xl font-bold mb-4"><i class="fas fa-list text-cyan-400 mr-2"></i> My Advertisements</h2>
            <div id="myAdsList" class="space-y-3 max-h-96 overflow-y-auto">
                <div class="text-center py-8 text-gray-400">No ads yet. Create your first ad above!</div>
            </div>
        </div>

        <!-- Orders Received -->
        <div class="glass-card p-6">
            <h2 class="text-xl font-bold mb-4"><i class="fas fa-truck text-cyan-400 mr-2"></i> Orders Received</h2>
            <div id="ordersList" class="space-y-3 max-h-96 overflow-y-auto">
                <div class="text-center py-8 text-gray-400">No orders yet</div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/';
        
        let currentUser = null;
        
        async function loadCompanyData() {
            try {
                // Load user info
                const userRes = await fetch('/api/auth/me', {
                    headers: { Authorization: `Bearer ${token}` }
                });
                currentUser = await userRes.json();
                document.getElementById('companyName').textContent = currentUser.companyName || currentUser.fullName;
                document.getElementById('companyRating').innerHTML = `⭐ ${currentUser.rating?.toFixed(1) || '5.0'}`;
                
                // Load stats
                const statsRes = await fetch('/api/company/stats', {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const stats = await statsRes.json();
                document.getElementById('statActiveAds').textContent = stats.ads?.active || 0;
                document.getElementById('statOrders').textContent = stats.orders?.total || 0;
                document.getElementById('statRevenue').textContent = `$${stats.spent || 0}`;
                document.getElementById('walletBalance').textContent = `$${currentUser.walletBalance || 0}`;
                
                // Load my ads
                const adsRes = await fetch('/api/ads/my', {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const myAds = await adsRes.json();
                const adsDiv = document.getElementById('myAdsList');
                if (myAds.length === 0) {
                    adsDiv.innerHTML = '<div class="text-center py-8 text-gray-400">No ads yet</div>';
                } else {
                    adsDiv.innerHTML = myAds.map(ad => `
                        <div class="bg-white/5 rounded-lg p-4 flex justify-between items-center">
                            <div class="flex items-center gap-3">
                                ${ad.mediaUrls?.[0] ? `<img src="${ad.mediaUrls[0]}" class="w-16 h-16 object-cover rounded">` : ''}
                                <div>
                                    <p class="font-semibold">${ad.title}</p>
                                    <p class="text-sm text-gray-400">${ad.status} | ${ad.views || 0} views | ${ad.clicks || 0} clicks</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-cyan-400 font-bold">${ad.currency} ${ad.price}</p>
                                <button onclick="deleteAd('${ad._id}')" class="text-red-400 text-sm hover:text-red-300 mt-1">
                                    <i class="fas fa-trash"></i> Delete
                                </button>
                            </div>
                        </div>
                    `).join('');
                }
                
                // Load orders
                const ordersRes = await fetch('/api/orders', {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const orders = await ordersRes.json();
                const ordersDiv = document.getElementById('ordersList');
                if (orders.length === 0) {
                    ordersDiv.innerHTML = '<div class="text-center py-8 text-gray-400">No orders received</div>';
                } else {
                    const statusColors = { pending: 'yellow', scanning: 'blue', in_transit: 'orange', quality_check: 'purple', completed: 'green' };
                    ordersDiv.innerHTML = orders.map(order => `
                        <div class="bg-white/5 rounded-lg p-4">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="font-mono text-sm">#${order.orderNumber}</p>
                                    <p class="font-semibold">${order.productName}</p>
                                    <p class="text-sm text-gray-400">Qty: ${order.quantity}</p>
                                </div>
                                <div class="text-right">
                                    <span class="px-2 py-1 rounded-full text-xs bg-${statusColors[order.status]}-500/30">
                                        ${order.status}
                                    </span>
                                </div>
                            </div>
                            <div class="flex gap-2 mt-3">
                                <button onclick="trackOrder('${order.orderNumber}')" class="px-3 py-1 bg-cyan-600 rounded-full text-xs">
                                    <i class="fas fa-map-marker-alt"></i> Track
                                </button>
                                <button onclick="chatWithCustomer('${order.receiverId?._id}')" class="px-3 py-1 bg-green-600 rounded-full text-xs">
                                    <i class="fab fa-whatsapp"></i> Chat
                                </button>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading company data:', error);
            }
        }
        
        document.getElementById('createAdForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('title', document.getElementById('adTitle').value);
            formData.append('description', document.getElementById('adDescription').value);
            formData.append('category', document.getElementById('adCategory').value);
            formData.append('adType', document.getElementById('adType').value);
            formData.append('price', document.getElementById('adPrice').value || (document.getElementById('adType').value === 'banner' ? 100 : document.getElementById('adType').value === 'featured' ? 500 : 1000));
            formData.append('currency', 'USD');
            formData.append('mediaType', 'image');
            if (document.getElementById('adExpiry').value) formData.append('expiryDate', document.getElementById('adExpiry').value);
            
            const mediaFiles = document.getElementById('adMedia').files;
            for (let i = 0; i < mediaFiles.length; i++) {
                formData.append('media', mediaFiles[i]);
            }
            
            const res = await fetch('/api/ads/create', {
                method: 'POST',
                headers: { Authorization: `Bearer ${token}` },
                body: formData
            });
            
            if (res.ok) {
                alert('Ad submitted for approval!');
                document.getElementById('createAdForm').reset();
                loadCompanyData();
            } else {
                const error = await res.json();
                alert('Error: ' + error.error);
            }
        });
        
        async function deleteAd(adId) {
            if (confirm('Delete this ad permanently?')) {
                await fetch(`/api/ads/${adId}`, {
                    method: 'DELETE',
                    headers: { Authorization: `Bearer ${token}` }
                });
                loadCompanyData();
            }
        }
        
        function trackOrder(orderNumber) {
            window.open(`/track.html?order=${orderNumber}`, '_blank');
        }
        
        function chatWithCustomer(customerId) {
            window.open('https://wa.me/255796323348?text=I%20have%20a%20question%20about%20my%20order', '_blank');
        }
        
        loadCompanyData();
        
        socket.on('order-update', () => loadCompanyData());
    </script>
</body>
</html>
