<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product - City Find</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-gray-900 to-black text-white">
    <div class="container mx-auto px-4 py-8">
        <div class="glass-card p-8 max-w-4xl mx-auto">
            <div id="productContent">
                <!-- Product content loads here -->
            </div>
            <div class="mt-8 flex gap-4">
                <button onclick="window.location.href='/'" class="bg-cyan-500 px-6 py-2 rounded-full hover:bg-cyan-600">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </button>
                <button onclick="window.open('https://wa.me/255796323348?text=I%27m%20interested%20in%20this%20product', '_blank')" class="bg-green-500 px-6 py-2 rounded-full hover:bg-green-600">
                    <i class="fab fa-whatsapp"></i> Contact Seller
                </button>
            </div>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        // Fetch product details from API
        fetch(`/api/ads/${productId}`)
            .then(res => res.json())
            .then(product => {
                document.getElementById('productContent').innerHTML = `
                    <h1 class="text-3xl font-bold mb-4">${product.title}</h1>
                    ${product.mediaUrls && product.mediaUrls[0] ? `<img src="${product.mediaUrls[0]}" class="w-full rounded-lg mb-4">` : ''}
                    <p class="text-gray-300 mb-4">${product.description}</p>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div><span class="text-gray-400">Category:</span> ${product.category}</div>
                        <div><span class="text-gray-400">Price:</span> ${product.currency} ${product.price}</div>
                        <div><span class="text-gray-400">Seller:</span> ${product.companyId?.companyName || 'City Find'}</div>
                        <div><span class="text-gray-400">Rating:</span> ⭐ ${product.companyId?.rating || 5}</div>
                    </div>
                `;
            });
    </script>
</body>
</html>
