<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Dashboard - City Find</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.6.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(ellipse at 30% 40%, #0a0f2a, #000000);
            font-family: 'Segoe UI', sans-serif;
        }
        .glass-card {
            background: rgba(15, 25, 45, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        .glass-card:hover { border-color: rgba(0, 242, 254, 0.5); transform: translateY(-3px); }
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00f2fe, #9b51e0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        #map {
            height: 300px;
            border-radius: 16px;
            margin-top: 16px;
        }
    </style>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body class="text-white">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">
                    Delivery Provider Dashboard
                </h1>
                <p class="text-gray-400 mt-1">Manage deliveries, track shipments, earn rewards</p>
            </div>
            <div class="flex gap-3">
                <div class="glass-card px-4 py-2">
                    <i class="fas fa-star text-yellow-400"></i>
                    <span id="providerRating" class="ml-2">5.0</span>
                </div>
                <div class="glass-card px-4 py-2">
                    <i class="fas fa-dollar-sign text-green-400"></i>
                    <span id="providerEarnings" class="ml-2">$0</span>
                </div>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="glass-card p-6 text-center">
                <i class="fas fa-truck text-3xl text-cyan-400 mb-2"></i>
                <p class="stat-number" id="statActiveDeliveries">0</p>
                <p class="text-sm text-gray-400">Active Deliveries</p>
            </div>
            <div class="glass-card p-6 text-center">
                <i class="fas fa-check-circle text-3xl text-green-400 mb-2"></i>
                <p class="stat-number" id="statCompleted">0</p>
                <p class="text-sm text-gray-400">Completed</p>
            </div>
            <div class="glass-card p-6 text-center">
                <i class="fas fa-clock text-3xl text-yellow-400 mb-2"></i>
                <p class="stat-number" id="statPending">0</p>
                <p class="text-sm text-gray-400">Pending</p>
            </div>
            <div class="glass-card p-6 text-center">
                <i class="fas fa-route text-3xl text-purple-400 mb-2"></i>
                <p class="stat-number" id="statDistance">0</p>
                <p class="text-sm text-gray-400">KM Traveled</p>
            </div>
        </div>

        <!-- Available Deliveries -->
        <div class="glass-card p-6 mb-8">
            <h2 class="text-xl font-bold mb-4"><i class="fas fa-box-open text-cyan-400 mr-2"></i> Available Deliveries</h2>
            <div id="availableDeliveries" class="space-y-3 max-h-80 overflow-y-auto">
                <div class="text-center py-8 text-gray-400">Loading available deliveries...</div>
            </div>
        </div>

        <!-- My Active Deliveries -->
        <div class="glass-card p-6 mb-8">
            <h2 class="text-xl font-bold mb-4"><i class="fas fa-truck-moving text-cyan-400 mr-2"></i> My Active Deliveries</h2>
            <div id="myDeliveries" class="space-y-3 max-h-80 overflow-y-auto">
                <div class="text-center py-8 text-gray-400">No active deliveries</div>
            </div>
        </div>

        <!-- Live Tracking Map -->
        <div class="glass-card p-6">
            <h2 class="text-xl font-bold mb-4"><i class="fas fa-map-marked-alt text-cyan-400 mr-2"></i> Live Location Tracking</h2>
            <div id="map"></div>
            <div class="flex gap-3 mt-4">
                <button onclick="startLocationTracking()" class="flex-1 bg-cyan-600 rounded-full py-2 hover:bg-cyan-700">
                    <i class="fas fa-play"></i> Start Tracking
                </button>
                <button onclick="stopLocationTracking()" class="flex-1 bg-red-600 rounded-full py-2 hover:bg-red-700">
                    <i class="fas fa-stop"></i> Stop Tracking
                </button>
            </div>
            <p id="trackingStatus" class="text-center text-gray-400 text-sm mt-3">Not tracking</p>
        </div>
    </div>

    <script>
        const socket = io();
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/';
        
        let map;
        let marker;
        let watchId;
        let currentLocation = { lat: -6.7924, lng: 39.2083 }; // Default Dar es Salaam
        
        function initMap() {
            map = L.map('map').setView([currentLocation.lat, currentLocation.lng], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
            }).addTo(map);
            marker = L.marker([currentLocation.lat, currentLocation.lng]).addTo(map);
        }
        
        async function loadProviderData() {
            try {
                const userRes = await fetch('/api/auth/me', {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const user = await userRes.json();
                document.getElementById('providerRating').textContent = user.rating?.toFixed(1) || '5.0';
                document.getElementById('providerEarnings').textContent = `$${user.walletBalance || 0}`;
                
                const statsRes = await fetch('/api/provider/stats', {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const stats = await statsRes.json();
                document.getElementById('statActiveDeliveries').textContent = stats.deliveries?.pending || 0;
                document.getElementById('statCompleted').textContent = stats.deliveries?.completed || 0;
                document.getElementById('statPending').textContent = stats.deliveries?.total || 0;
                
                // Load available deliveries (orders in pending/scanning status)
                const ordersRes = await fetch('/api/orders', {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const allOrders = await ordersRes.json();
                const available = allOrders.filter(o => o.status === 'pending' || o.status === 'scanning');
                const availableDiv = document.getElementById('availableDeliveries');
                if (available.length === 0) {
                    availableDiv.innerHTML = '<div class="text-center py-8 text-gray-400">No deliveries available</div>';
                } else {
                    availableDiv.innerHTML = available.map(order => `
                        <div class="bg-white/5 rounded-lg p-4 flex justify-between items-center">
                            <div>
                                <p class="font-semibold">#${order.orderNumber}</p>
                                <p class="text-sm">${order.productName} | Qty: ${order.quantity}</p>
                                <p class="text-xs text-gray-400">From: ${order.senderId?.companyName || order.senderId?.fullName}</p>
                            </div>
                            <button onclick="acceptDelivery('${order.orderNumber}')" class="px-4 py-2 bg-green-600 rounded-full text-sm hover:bg-green-700">
                                <i class="fas fa-check"></i> Accept
                            </button>
                        </div>
                    `).join('');
                }
                
                // My deliveries
                const myDeliveries = allOrders.filter(o => o.providerId === user._id);
                const myDiv = document.getElementById('myDeliveries');
                if (myDeliveries.length === 0) {
                    myDiv.innerHTML = '<div class="text-center py-8 text-gray-400">No active deliveries</div>';
                } else {
                    const statusColors = { pending: 'yellow', scanning: 'blue', in_transit: 'orange', quality_check: 'purple' };
                    myDiv.innerHTML = myDeliveries.map(order => `
                        <div class="bg-white/5 rounded-lg p-4">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="font-mono text-sm">#${order.orderNumber}</p>
                                    <p class="font-semibold">${order.productName}</p>
                                    <p class="text-sm text-gray-400">To: ${order.receiverId?.fullName || 'Customer'}</p>
                                </div>
                                <div class="text-right">
                                    <span class="px-2 py-1 rounded-full text-xs bg-${statusColors[order.status]}-500/30">
                                        ${order.status}
                                    </span>
                                    <p class="text-xs text-cyan-400 mt-1">Fee: $${order.deliveryFee || 10}</p>
                                </div>
                            </div>
                            <div class="flex gap-2 mt-3">
                                <button onclick="scanOrder('${order.orderNumber}')" class="px-3 py-1 bg-blue-600 rounded-full text-xs">
                                    <i class="fas fa-qrcode"></i> Scan QR
                                </button>
                                <button onclick="updateOrderStatus('${order.orderNumber}')" class="px-3 py-1 bg-cyan-600 rounded-full text-xs">
                                    <i class="fas fa-arrow-right"></i> Update Status
                                </button>
                                <button onclick="chatWithCustomer('${order.receiverId?._id}')" class="px-3 py-1 bg-green-600 rounded-full text-xs">
                                    <i class="fab fa-whatsapp"></i> Chat
                                </button>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading provider data:', error);
            }
        }
        
        async function acceptDelivery(orderNumber) {
            const res = await fetch(`/api/orders/scan`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    Authorization: `Bearer ${token}`
                },
                body: JSON.stringify({ orderNumber, location: currentLocation })
            });
            if (res.ok) {
                alert('Delivery accepted!');
                loadProviderData();
            }
        }
        
        async function updateOrderStatus(orderNumber) {
            const statuses = ['scanning', 'in_transit', 'quality_check'];
            const current = await getOrderStatus(orderNumber);
            const nextIndex = statuses.indexOf(current) + 1;
            if (nextIndex >= statuses.length) {
                alert('Delivery complete! Waiting for customer quality check.');
                return;
            }
            
            const res = await fetch(`/api/orders/scan`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    Authorization: `Bearer ${token}`
                },
                body: JSON.stringify({ 
                    orderNumber, 
                    location: currentLocation,
                    videoUrl: '',
                    photoUrls: []
                })
            });
            if (res.ok) {
                alert(`Status updated to ${statuses[nextIndex]}`);
                loadProviderData();
            }
        }
        
        async function scanOrder(orderNumber) {
            // Simulate QR scan
            const qrData = prompt('Scan QR code or enter order number:', orderNumber);
            if (qrData) {
                alert(`QR scanned: ${qrData}\nProduct verified!`);
                updateOrderStatus(orderNumber);
            }
        }
        
        async function getOrderStatus(orderNumber) {
            const res = await fetch(`/api/orders/${orderNumber}`);
            const order = await res.json();
            return order.status;
        }
        
        function startLocationTracking() {
            if ('geolocation' in navigator) {
                watchId = navigator.geolocation.watchPosition(async (position) => {
                    currentLocation = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    
                    if (marker) {
                        marker.setLatLng([currentLocation.lat, currentLocation.lng]);
                        map.setView([currentLocation.lat, currentLocation.lng]);
                    }
                    
                    document.getElementById('trackingStatus').innerHTML = '<i class="fas fa-circle text-green-400"></i> Tracking active';
                    
                    // Send location to server for active deliveries
                    const myDeliveriesDiv = document.getElementById('myDeliveries');
                    const orderNumbers = [];
                    document.querySelectorAll('#myDeliveries .font-mono').forEach(el => {
                        orderNumbers.push(el.textContent.replace('#', ''));
                    });
                    
                    for (const orderNumber of orderNumbers) {
                        await fetch('/api/orders/update-location', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                Authorization: `Bearer ${token}`
                            },
                            body: JSON.stringify({
                                orderNumber,
                                lat: currentLocation.lat,
                                lng: currentLocation.lng,
                                address: 'Live location'
                            })
                        });
                    }
                }, (error) => {
                    console.error('Geolocation error:', error);
                    document.getElementById('trackingStatus').innerHTML = '<i class="fas fa-exclamation-triangle text-red-400"></i> Location error';
                }, {
                    enableHighAccuracy: true,
                    maximumAge: 5000,
                    timeout: 10000
                });
            } else {
                alert('Geolocation not supported');
            }
        }
        
        function stopLocationTracking() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                document.getElementById('trackingStatus').innerHTML = '<i class="fas fa-stop-circle text-red-400"></i> Tracking stopped';
            }
        }
        
        function chatWithCustomer(customerId) {
            window.open('https://wa.me/255796323348?text=Your%20delivery%20is%20on%20the%20way!', '_blank');
        }
        
        // Initialize
        initMap();
        loadProviderData();
        
        socket.on('order-update', () => loadProviderData());
    </script>
</body>
</html>
