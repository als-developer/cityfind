<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Find - Global Business Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.6.2/socket.io.min.js"></script>
    <style>
        /* Galaxy Animations for different ad types */
        .galaxy-bg { background: radial-gradient(ellipse at center, #0a0f2a 0%, #000 100%); }
        .galaxy-spiral { animation: spiralPulse 8s ease-in-out infinite; }
        .galaxy-explode { animation: explodePulse 6s ease-in-out infinite; }
        .galaxy-nebula { animation: nebulaFloat 10s ease-in-out infinite; }
        .galaxy-blackhole { animation: blackholePulse 7s ease-in-out infinite; }
        
        @keyframes spiralPulse {
            0%, 100% { transform: rotate(0deg) scale(1); opacity: 0.8; }
            50% { transform: rotate(180deg) scale(1.05); opacity: 1; }
        }
        @keyframes explodePulse {
            0%, 100% { filter: brightness(1) blur(0px); }
            50% { filter: brightness(1.5) blur(2px); }
        }
        @keyframes nebulaFloat {
            0%, 100% { transform: translateY(0px) scale(1); background-position: 0% 0%; }
            50% { transform: translateY(-10px) scale(1.02); background-position: 100% 100%; }
        }
        @keyframes blackholePulse {
            0%, 100% { filter: drop-shadow(0 0 20px #9b51e0); }
            50% { filter: drop-shadow(0 0 60px #00f2fe); }
        }
        
        .ad-card {
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .ad-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,242,254,0.2);
        }
        
        /* Language Selector */
        .lang-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 8px 16px;
            border: 1px solid #00f2fe;
        }
        
        /* Bot Chat */
        .chat-bot {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 350px;
            height: 500px;
            background: rgba(10,15,42,0.95);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid #00f2fe;
            display: none;
            flex-direction: column;
            z-index: 1000;
        }
        .chat-bot.open { display: flex; }
    </style>
</head>
<body class="galaxy-bg text-white">

    <!-- Language Selector -->
    <div class="lang-selector">
        <select id="languageSelect" class="bg-transparent text-white border-none outline-none">
            <option value="en">🌍 English</option>
            <option value="sw">🇹🇿 Kiswahili</option>
            <option value="fr">🇫🇷 Français</option>
            <option value="es">🇪🇸 Español</option>
            <option value="ar">🇸🇦 العربية</option>
            <option value="zh">🇨🇳 中文</option>
            <option value="hi">🇮🇳 हिंदी</option>
            <option value="pt">🇵🇹 Português</option>
            <option value="ru">🇷🇺 Русский</option>
            <option value="de">🇩🇪 Deutsch</option>
        </select>
    </div>

    <!-- Main Content -->
    <div class="container mx-auto px-4 py-8">
        <!-- Hero Section -->
        <div class="text-center py-12">
            <h1 class="text-5xl md:text-7xl font-bold bg-gradient-to-r from-cyan-400 to-purple-600 bg-clip-text text-transparent">
                City Find
            </h1>
            <p class="text-xl text-gray-300 mt-4">Global Business Ads & Logistics Platform</p>
            <div class="flex justify-center gap-4 mt-8">
                <button onclick="showDashboard('admin')" class="px-6 py-2 bg-purple-600 rounded-full hover:bg-purple-700">Admin Panel</button>
                <button onclick="showDashboard('company')" class="px-6 py-2 bg-cyan-600 rounded-full hover:bg-cyan-700">Company Portal</button>
                <button onclick="showDashboard('provider')" class="px-6 py-2 bg-green-600 rounded-full hover:bg-green-700">Service Provider</button>
                <button onclick="showDashboard('receiver')" class="px-6 py-2 bg-blue-600 rounded-full hover:bg-blue-700">Receiver Portal</button>
            </div>
        </div>

        <!-- Ads Grid with Galaxy Animations -->
        <div id="adsGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Ads will load here dynamically with galaxy effects -->
        </div>
    </div>

    <!-- AI Chat Bot -->
    <button id="chatToggle" class="fixed bottom-6 right-6 bg-gradient-to-r from-cyan-500 to-purple-600 w-14 h-14 rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition z-50">
        <i class="fas fa-robot text-white text-2xl"></i>
    </button>
    
    <div id="chatBot" class="chat-bot">
        <div class="bg-gradient-to-r from-cyan-600 to-purple-600 p-3 rounded-t-2xl flex justify-between">
            <span><i class="fas fa-robot mr-2"></i> AI Business Assistant</span>
            <button id="chatClose" class="text-white"><i class="fas fa-times"></i></button>
        </div>
        <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
        <div class="p-3 border-t border-gray-700 flex gap-2">
            <input type="text" id="chatInput" placeholder="Ask anything about business..." class="flex-1 bg-gray-800 rounded-full px-4 py-2 outline-none">
            <button id="chatSend" class="bg-cyan-500 px-4 py-2 rounded-full"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const socket = io();
        let currentUser = null;
        
        // Load ads with animations
        async function loadAds() {
            const res = await fetch('/api/ads');
            const ads = await res.json();
            const grid = document.getElementById('adsGrid');
            grid.innerHTML = ads.map(ad => `
                <div class="ad-card bg-white/10 rounded-xl overflow-hidden border border-cyan-500/30 ${getGalaxyClass(ad.galaxyAnimation)}">
                    ${ad.mediaType === 'video' ? `<video src="${ad.mediaUrls[0]}" class="w-full h-48 object-cover" autoplay muted loop></video>` : 
                      ad.mediaType === 'animation' ? `<div class="w-full h-48 flex items-center justify-center bg-gradient-to-r from-cyan-500/20 to-purple-500/20"><i class="fas fa-film text-5xl text-cyan-400"></i></div>` :
                      `<img src="${ad.mediaUrls[0]}" class="w-full h-48 object-cover" onerror="this.src='https://placehold.co/400x300/0a0f2a/00f2fe?text=CITY+FIND'">`}
                    <div class="p-4">
                        <h3 class="font-bold text-lg">${ad.title}</h3>
                        <p class="text-gray-300 text-sm mt-1">${ad.description}</p>
                        <div class="flex justify-between items-center mt-3">
                            <span class="text-cyan-400 font-bold">${ad.currency} ${ad.price}</span>
                            <button onclick="contactBusiness('${ad.companyId?._id}')" class="bg-cyan-500 px-3 py-1 rounded-full text-sm">Contact</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function getGalaxyClass(animation) {
            const map = {
                'spiral_galaxy': 'galaxy-spiral',
                'exploding_stars': 'galaxy-explode',
                'nebula_cloud': 'galaxy-nebula',
                'black_hole_pulse': 'galaxy-blackhole'
            };
            return map[animation] || 'galaxy-spiral';
        }
        
        // Language switching
        const translations = {
            en: { title: "City Find - Global Business Platform" },
            sw: { title: "City Find - Jukwaa la Biashara Duniani" },
            fr: { title: "City Find - Plateforme Commerciale Mondiale" },
            es: { title: "City Find - Plataforma de Negocios Global" },
            ar: { title: "سيتي فايند - منصة الأعمال العالمية" },
            zh: { title: "City Find - 全球商业平台" },
            hi: { title: "सिटी फाइंड - वैश्विक व्यापार मंच" }
        };
        
        document.getElementById('languageSelect').addEventListener('change', (e) => {
            const lang = e.target.value;
            document.querySelector('title').textContent = translations[lang]?.title || translations.en.title;
        });
        
        // Chat bot
        const chatToggle = document.getElementById('chatToggle');
        const chatBot = document.getElementById('chatBot');
        const chatClose = document.getElementById('chatClose');
        const chatInput = document.getElementById('chatInput');
        const chatSend = document.getElementById('chatSend');
        const chatMessages = document.getElementById('chatMessages');
        
        chatToggle.onclick = () => chatBot.classList.toggle('open');
        chatClose.onclick = () => chatBot.classList.remove('open');
        
        async function sendMessage() {
            const msg = chatInput.value.trim();
            if (!msg) return;
            
            chatMessages.innerHTML += `<div class="bg-cyan-600 rounded-lg p-2 ml-auto max-w-[80%]">${msg}</div>`;
            chatInput.value = '';
            
            const res = await fetch('/api/bot/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg, context: { userRole: currentUser?.role || 'guest' } })
            });
            const data = await res.json();
            chatMessages.innerHTML += `<div class="bg-purple-600 rounded-lg p-2 mr-auto max-w-[80%]">${data.reply}</div>`;
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        chatSend.onclick = sendMessage;
        chatInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
        
        function showDashboard(type) {
            window.location.href = `/dashboard-${type}.html`;
        }
        
        function contactBusiness(companyId) {
            window.open(`https://wa.me/${process.env.ADMIN_PHONE || '255796323348'}?text=I'm%20interested%20in%20your%20ad%20on%20City%20Find`, '_blank');
        }
        
        loadAds();
        
        // Real-time order updates
        socket.on('order-update', (data) => {
            console.log('Order update:', data);
        });
    </script>
</body>
</html>
